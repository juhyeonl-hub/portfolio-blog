<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="'IBM Plex Mono', 'Menlo', 'Monaco', monospace">
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a3c6e"/>
    </marker>
    <marker id="arrow1light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a9ab0"/>
    </marker>
    <pattern id="dotgrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#e6e9ef"/>
    </pattern>
  </defs>

  <rect width="900" height="720" fill="#fafbfc"/>
  <rect width="900" height="720" fill="url(#dotgrid)"/>

  <text x="40" y="48" font-size="22" font-weight="700" fill="#1a3c6e" letter-spacing="0.5">
    The Workflow — From Idea to v1.0
  </text>
  <text x="40" y="70" font-size="13" fill="#6b7689" letter-spacing="0.3">
    A specification-first loop where the engineer decides and the agent executes.
  </text>
  <line x1="40" y1="86" x2="860" y2="86" stroke="#1a3c6e" stroke-width="1"/>

  <text x="40" y="120" font-size="11" font-weight="700" fill="#8a9ab0" letter-spacing="2">PHASE 1 — SETUP</text>

  <rect x="40" y="135" width="200" height="80" fill="#ffffff" stroke="#1a3c6e" stroke-width="1.5" rx="2"/>
  <text x="56" y="158" font-size="12" font-weight="700" fill="#1a3c6e">CLAUDE.md</text>
  <text x="56" y="178" font-size="11" fill="#4a5568">operating rules</text>
  <text x="56" y="194" font-size="10" fill="#8a9ab0">— what is allowed</text>
  <text x="56" y="207" font-size="10" fill="#8a9ab0">— what needs approval</text>

  <line x1="240" y1="175" x2="290" y2="175" stroke="#1a3c6e" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="290" y="135" width="200" height="80" fill="#ffffff" stroke="#1a3c6e" stroke-width="1.5" rx="2"/>
  <text x="306" y="158" font-size="12" font-weight="700" fill="#1a3c6e">7 Questions</text>
  <text x="306" y="178" font-size="11" fill="#4a5568">agent asks, I answer</text>
  <text x="306" y="194" font-size="10" fill="#8a9ab0">— goal, stack, features</text>
  <text x="306" y="207" font-size="10" fill="#8a9ab0">— completion criteria</text>

  <line x1="490" y1="175" x2="540" y2="175" stroke="#1a3c6e" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="540" y="135" width="200" height="80" fill="#1a3c6e" stroke="#1a3c6e" stroke-width="1.5" rx="2"/>
  <text x="556" y="158" font-size="12" font-weight="700" fill="#ffffff">PROJECT_BRIEF.md</text>
  <text x="556" y="178" font-size="11" fill="#c6d3e6">source of truth</text>
  <text x="556" y="194" font-size="10" fill="#8aa4cc">— goal, scope, criteria</text>
  <text x="556" y="207" font-size="10" fill="#8aa4cc">— task progress</text>

  <line x1="640" y1="215" x2="640" y2="265" stroke="#1a3c6e" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow1)"/>

  <text x="40" y="285" font-size="11" font-weight="700" fill="#8a9ab0" letter-spacing="2">PHASE 2 — EXECUTION LOOP</text>

  <rect x="40" y="300" width="820" height="240" fill="#ffffff" stroke="#1a3c6e" stroke-width="1" rx="2"/>

  <rect x="70" y="335" width="160" height="60" fill="#fafbfc" stroke="#4a5568" stroke-width="1" rx="2"/>
  <text x="86" y="355" font-size="11" font-weight="700" fill="#1a3c6e">PRE-TASK</text>
  <text x="86" y="372" font-size="10" fill="#4a5568">define goal,</text>
  <text x="86" y="385" font-size="10" fill="#4a5568">scope, I/O</text>

  <line x1="230" y1="365" x2="270" y2="365" stroke="#1a3c6e" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="270" y="335" width="160" height="60" fill="#fafbfc" stroke="#4a5568" stroke-width="1" rx="2"/>
  <text x="286" y="355" font-size="11" font-weight="700" fill="#1a3c6e">EXECUTE</text>
  <text x="286" y="372" font-size="10" fill="#4a5568">one step,</text>
  <text x="286" y="385" font-size="10" fill="#4a5568">build, run</text>

  <line x1="430" y1="365" x2="470" y2="365" stroke="#1a3c6e" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="470" y="335" width="160" height="60" fill="#fafbfc" stroke="#4a5568" stroke-width="1" rx="2"/>
  <text x="486" y="355" font-size="11" font-weight="700" fill="#1a3c6e">SELF-VERIFY</text>
  <text x="486" y="372" font-size="10" fill="#4a5568">report inputs,</text>
  <text x="486" y="385" font-size="10" fill="#4a5568">outputs, gaps</text>

  <line x1="630" y1="365" x2="670" y2="365" stroke="#1a3c6e" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <polygon points="750,335 815,365 750,395 685,365" fill="#fafbfc" stroke="#4a5568" stroke-width="1"/>
  <text x="724" y="362" font-size="10" font-weight="700" fill="#1a3c6e">human</text>
  <text x="722" y="375" font-size="10" font-weight="700" fill="#1a3c6e">test?</text>

  <text x="585" y="425" font-size="10" font-weight="700" fill="#1a3c6e">no</text>
  <path d="M 750 395 Q 750 440 600 440 Q 150 440 150 395" fill="none" stroke="#1a3c6e" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <text x="822" y="395" font-size="10" font-weight="700" fill="#1a3c6e">yes</text>
  <line x1="815" y1="365" x2="850" y2="365" stroke="#1a3c6e" stroke-width="1.5"/>
  <line x1="850" y1="365" x2="850" y2="475" stroke="#1a3c6e" stroke-width="1.5"/>

  <rect x="540" y="455" width="280" height="60" fill="#1a3c6e" stroke="#1a3c6e" stroke-width="1" rx="2"/>
  <text x="556" y="475" font-size="11" font-weight="700" fill="#ffffff">USER TEST</text>
  <text x="556" y="492" font-size="10" fill="#c6d3e6">I run the test cases agent provides,</text>
  <text x="556" y="505" font-size="10" fill="#c6d3e6">decide: fix / continue / prototype first</text>

  <line x1="850" y1="475" x2="820" y2="475" stroke="#1a3c6e" stroke-width="1.5"/>
  <path d="M 540 485 Q 100 485 100 395" fill="none" stroke="#1a3c6e" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <text x="450" y="325" font-size="10" fill="#8a9ab0" font-style="italic" text-anchor="middle">repeat per task step</text>

  <text x="40" y="570" font-size="11" font-weight="700" fill="#8a9ab0" letter-spacing="2">PHASE 3 — COMPLETION</text>

  <rect x="40" y="585" width="240" height="80" fill="#ffffff" stroke="#1a3c6e" stroke-width="1.5" rx="2"/>
  <text x="56" y="608" font-size="12" font-weight="700" fill="#1a3c6e">Self-verification report</text>
  <text x="56" y="628" font-size="10" fill="#4a5568">— how was it tested</text>
  <text x="56" y="642" font-size="10" fill="#4a5568">— what inputs/outputs</text>
  <text x="56" y="656" font-size="10" fill="#4a5568">— what was NOT tested</text>

  <line x1="280" y1="625" x2="320" y2="625" stroke="#1a3c6e" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="320" y="585" width="240" height="80" fill="#ffffff" stroke="#1a3c6e" stroke-width="1.5" rx="2"/>
  <text x="336" y="608" font-size="12" font-weight="700" fill="#1a3c6e">All criteria checked?</text>
  <text x="336" y="628" font-size="10" fill="#4a5568">— build green</text>
  <text x="336" y="642" font-size="10" fill="#4a5568">— execution verified</text>
  <text x="336" y="656" font-size="10" fill="#4a5568">— brief checkboxes done</text>

  <line x1="560" y1="625" x2="600" y2="625" stroke="#1a3c6e" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="600" y="585" width="240" height="80" fill="#1a3c6e" stroke="#1a3c6e" stroke-width="1.5" rx="2"/>
  <text x="616" y="608" font-size="12" font-weight="700" fill="#ffffff">v1.0</text>
  <text x="616" y="628" font-size="10" fill="#c6d3e6">working version,</text>
  <text x="616" y="642" font-size="10" fill="#c6d3e6">verified end-to-end,</text>
  <text x="616" y="656" font-size="10" fill="#c6d3e6">ready to ship</text>

  <text x="450" y="700" font-size="10" fill="#8a9ab0" text-anchor="middle" font-style="italic">
    Decisions live in the brief. Execution lives in the loop. Verification lives in the report.
  </text>
</svg>
